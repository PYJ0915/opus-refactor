spring.application.name=opus_server

# port 번호를 80으로 변경(80은 HTTP의 기본포트번호로, 브라우저에서 포트번호 없이 접속 가능)
server.port=80

# Spring DevTools (자동 리로드, 서버 재시작) 설정
# 브라우저 자동 새로고침 기능
spring.devtools.livereload.enabled=true
# 코드 변경 시 서버 자동 재시작
spring.devtools.restart.enabled=true
# 타임리프 캐시 비활성화 (HTML 파일 수정 시 바로 변경사항 확인할 수 있도록)
spring.thymeleaf.cache=false

# 로그 레벨 지정
logging.level.nknk.opus.project=debug

# URL에 jsessionid 가 보여질때 설정
server.servlet.session.tracking-modes=cookie

mybatis.type-aliases-package=nknk.opus.project

# OAuth2 로그인 성공 시 리다이렉트 될 주소 (현재는 로컬주소, 배포시 수정)
app.oauth2.redirect-uri=http://localhost:5173/auth/success

# CORS 설정
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===== OpenAI 설정 =====
# API 키 (환경변수 우선)
openai.api.key=${OPENAI_API_KEY}

# 모델 선택
openai.model=gpt-4o-mini

# 최대 토큰 (응답 길이 제한)
openai.max.tokens=500

# Temperature (창의성 조절: 0.0~2.0)
# 0.7 = 균형잡힌 응답 (권장)
# 0.3 = 일관된 응답
# 1.0 = 창의적 응답
openai.temperature=0.7

# 로깅
logging.level.com.openai=DEBUG